<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="images/logo/logo.png" />
  <title>Services — LOTUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] } } }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-white text-gray-900 antialiased" data-page="services">

  <!-- HEADER (rendered from js/site-data.js) -->
  <div id="header-placeholder"></div>
  <script src="js/site-data.js"></script>
  <script src="js/layout.js"></script>

  <!-- SERVICE SUB-NAV (sticky, below main header) -->
  <div class="service-subnav" style="top:64px">
    <div class="service-tabs">
      <button class="service-tab active" data-svc="hdr"        onclick="switchService('hdr')">Photo Editing</button>
      <button class="service-tab"        data-svc="removal"    onclick="switchService('removal')">Item Removal</button>
      <button class="service-tab"        data-svc="staging"    onclick="switchService('staging')">Virtual Staging</button>
      <button class="service-tab"        data-svc="dusk"       onclick="switchService('dusk')">Day to Dusk</button>
    </div>
  </div>

  <!-- DYNAMIC SERVICE CONTENT -->
  <div id="service-content" style="padding-top:0">
    <!-- Populated by js/services.js -->
    <div class="flex items-center justify-center" style="min-height:60vh">
      <div class="text-gray-400 text-sm">Loading...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>
  <script>renderFooter();</script>

  <script src="js/main.js" defer></script>
  <script src="js/floating-buttons.js" defer></script>
  <script src="js/services.js" defer></script>
</body>
</html>
